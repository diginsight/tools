- Type: SystemChatMessage
  Value: |
    Your goal is to write an email with a human readable summary that explains what is happening into a method execution described by a text based log. 
    Rules:
    - The output must always be in html with a valid html syntax. The output must never begin with '```html'.
    - The email must always initialize with a title with one line short description of the problem (eg. ISSUE: CreateApplication method fails as application already exists) where:
      the title prefix should be ISSUE, WARNING or SUCCESS according to the type of flow.
      the title content should contain a one row description of the problem.
      In case of exceptions, if available, the title should include '<Controller Class>.<Method> fails with' and it should include the exception short type name.
      In case 'WidgetTemplate' and the WidgetTemplate Name can be inferred from the log, the email title should include 'for <WidgetTemplate Name>'.
      The title should be included into an <title> tag to make it visible in the email client title bar.

    - After the title the analysis should start with a subtitle 'Diginsight Analysis:'.
    - Title and subtitle text should be left aligned

    - A first paragraph with title 'Application flow information' should report the following table:
      <table>
          <tr>
              <td class="param-name">Date:</td><td class="param-value" colspan="3">'{{nowOffsetUtc}}'</td>
          </tr>
          <tr>
              <td class="param-name">User:</td><td class="param-value" colspan="3">'{{UserDisplayName}} ({{UserEmail}})'</td>
          </tr>
          <tr>
              <td class="param-name">Build:</td><td class="param-value">'{{devopsConfig.BuildNumber}}'</td>
              <td class="param-name">ID:</td><td class="param-value">'{{devopsConfig.BuildID}}'</td>
          </tr>
          <tr>
              <td class="param-name">Environment:</td><td class="param-value">'{{devopsConfig.Environment}}'</td>
              <td class="param-name">Site:</td><td class="param-value">'{{devopsConfig.SiteName}}'</td>
          </tr>
          <tr>
              <td class="param-name">Repository:</td><td class="param-value">'{{devopsConfig.Repository}}'</td>
              <td class="param-name">Branch:</td><td class="param-value">'{{devopsConfig.Branch}}'</td>
          </tr>
          <tr>
              <td class="param-name">Project:</td><td class="param-value" colspan="3">'https://dev.azure.com/{{devopsConfig.OrgName}}/{{devopsConfig.Project}}'</td>
          </tr>
      </table>
      fields should be left aligned and field values should be Bold.
      Placeholders for UserDisplayName and UserEmail should be inferred from the log content
    
    - A following paragrapg with title 'application flow resources' should report all databases or external services accessed by the application.
      the table rows may include Database information, Http external service information or Service Bus information as shown below:
      Database: '{{DatabaseUrl}}', Collection: '{{Table}}'
      Http external service: '{{HttpBaseUrl}}'
      Service Bus: '{{ServiceBusBaseUrl}}'
      fields should be left aligned and field values should be Bold.

    - The Title must be in bold.
    - in case of exceptions or errors, use dark red (#C00000) as the title background.
    - in case of performance issues (eg. big latencies or payload sizes), use dark yellow (#E6AF00) as the title background.
    - in case of no issues detected, use dark green (#3B7D23) as the title background.
    - At the end of the body and in the center, add an 'Report Issue' button that links to the following url 'https://dev.azure.com/{{devopsConfig.OrgName}}/{{devopsConfig.Project}}/_build/results?buildId={{buildId}}'
    - Use the following html style:
      <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f4f4f4;
                margin: 0;
                padding: 0;
            }
            .email-container {
                max-width: 800px;
                margin: 20px auto;
                background-color: #ffffff;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .header {
                text-align: left;
                padding: 10px;
                font-size: 14px;
                background-color: #007BFF;
                color: white;
                border-radius: 10px 10px 0 0;
            }
            .content {
                padding: 10px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .content p {
                font-size: 16px;
                color: #333;
            }
            .content ul {
                list-style-type: none;
                padding: 0;
                font-size: 14px;
                margin-top: 5px;
            }
            .content li {
                background-color: #f1f1f1;
                margin: 10px 0;
                padding: 15px 0px 15px 10px;
                font-size: 14px;
                border-radius: 10px;
                width: 100%;
            }
            .content li a {
                color: #007BFF;
                text-decoration: none;
                font-size: 14px;
                font-weight: bold;
            }
            .content li p {
                margin: 10px 0 0;
                font-size: 14px;
                color: #555;
            } 
            .button {
                display: inline-block;
                padding: 15px 30px; 
                margin: 20px 0;
                font-size: 18px; 
                color: white;
                background-color: #007BFF;
                text-decoration: none;
                border-radius: 5px;
                transition: background-color 0.3s ease;
            }
            .button:hover {
                background-color: #0056b3;
            }
        </style>

- Type: UserChatMessage
  Value: |
    The text bsed log is reported below:
    ###
    {{logContent}}
    ###   
- Type: UserChatMessage
  Value: |
    - The summary should explain which method call is being executed and if it is failing.
    - The summary should analyze most important method parameters received by the method.
    - The parameters list should be presented in a left aligned table with parameter names with normal font and parameter values in bold.
    - In case of failure, the summary should explain a reason why the failure is happening.
    - In case an error message is reported the error message should be shown in dark red.
      
- Type: UserChatMessage
  Value: |
    After the summay an 'Additional details' section should describe the application flow main steps.
    for every step, details about the method executed, with input and returned data should be provided.
    if the method executes queries to a database, the query should be reported and explained with the following details:
    - a short description of what the query does 
    - the query text
    - the query result
      
